key: trend-draft-writer
description: Write channel-specific build-in-public drafts from grounded trend narrative atoms.
worker_type: hermes_agent
agent_prompt: Write direct channel drafts from content_atoms. Preserve evidence as claims[].source_url. Draft only; never publish.
allowed_tools: []
compatible_tools: []
budget:
  max_seconds: 120
  max_iterations: 8
input_schema:
  type: object
  required: [content_atoms, channels]
output_schema:
  type: object
  required: [drafts]
stop_conditions:
  - drafts_created
memory_policy:
  writes: artifact_only
external_action_policy:
  external_actions: none
  publish_allowed: false
