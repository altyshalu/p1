key: trend-source-collector
description: Collect real GitHub, arXiv, and Hugging Face trend source results through allowed read-only tools, then normalize them. Must not invent sources.
worker_type: sandboxed_subprocess
entrypoint: l2l3_protocol.workers.build_in_public_worker
allowed_tools: [github-search-tool, arxiv-search-tool, hf-hub-search-tool]
compatible_tools: [github-search-tool, arxiv-search-tool, hf-hub-search-tool]
budget:
  max_seconds: 60
input_schema:
  type: object
  required: [query, providers]
  properties:
    query:
      type: string
    providers:
      type: array
    max_results:
      type: integer
    provider_repairs:
      type: object
output_schema:
  type: object
  required: [trend_signals]
  properties:
    trend_signals:
      type: array
    source_results:
      type: array
stop_conditions:
  - trend_signals_normalized
retry_policy:
  max_attempts: 3
  retryable_failure_types: [input_validation, worker_exception, timeout, provider_no_results]
provider_repair_policy:
  required_providers: [github, arxiv, huggingface]
  max_repair_attempts_per_provider: 3
  continue_partial_requires_user_approval: true
  l2_allowed_repair_actions:
    - retry_same_provider_with_new_query
    - retry_same_provider_with_shorter_query
    - retry_provider_with_resource_type
    - retry_after_worker_code_or_registry_change_candidate
    - ask_user_for_repair_direction
    - fail_if_provider_is_required
  provider_capabilities:
    github:
      resource_types: [repositories]
      query_fields: [q]
    arxiv:
      resource_types: [papers]
      query_fields: [all]
    huggingface:
      resource_types: [models, datasets, spaces]
      query_fields: [search]
memory_policy:
  writes: artifact_only
side_effect_policy:
  external_side_effects: none
