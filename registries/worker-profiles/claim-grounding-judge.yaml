key: claim-grounding-judge
description: Evaluate whether every draft claim has explicit source evidence.
worker_type: evaluator
entrypoint: l2l3_protocol.workers.build_in_public_worker
allowed_tools: []
compatible_tools: []
budget:
  max_seconds: 60
input_schema:
  type: object
  required: [drafts]
output_schema:
  type: object
  required: [passed, score, checks]
grader_spec:
  eval_key: trend-claim-grounding
retry_policy:
  max_attempts: 3
  retryable_failure_types: [eval_failed, output_schema, worker_exception]
repair_strategy:
  autonomous: true
  before_retry:
    - run draft-schema-normalizer to map evidence_urls to source_url
    - preserve claims and sources from prior artifacts
  escalation: never_for_schema_mapping
stop_conditions:
  - claim_grounding_report_created
memory_policy:
  writes: artifact_only
side_effect_policy:
  external_side_effects: none
