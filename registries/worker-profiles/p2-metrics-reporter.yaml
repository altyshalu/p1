key: p2-metrics-reporter
description: Report P2 funnel metrics from input rows through suitable rows and sync outcome.
worker_type: sandboxed_subprocess
entrypoint: l2l3_protocol.workers.p2_startup_worker
allowed_tools: []
compatible_tools: []
budget: {max_seconds: 60}
input_schema:
  type: object
  required: []
  properties:
    raw_startup_rows: {type: array}
    normalized_startups: {type: array}
    rejected_startups: {type: array}
    verification_summary: {type: object}
    judge_summary: {type: object}
    suitable_startups: {type: array}
    duplicates_removed: {type: number}
    sync_result: {type: object}
output_schema:
  type: object
  required: [metrics, summary]
  properties:
    metrics: {type: object}
    summary: {type: string}
retry_policy: {max_attempts: 1, retryable_failure_types: []}
memory_policy: {writes: artifact_only}
external_action_policy: {external_actions: none}
