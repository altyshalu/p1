key: trend-draft-quality-judge
description: Evaluate trend draft completeness, draft-only safety, and obvious AI slop.
worker_type: evaluator
entrypoint: l2l3_protocol.workers.build_in_public_worker
allowed_tools: []
compatible_tools: []
budget:
  max_seconds: 60
input_schema:
  type: object
  required: [drafts]
output_schema:
  type: object
  required: [passed, score, checks]
grader_spec:
  eval_key: trend-draft-quality
retry_policy:
  max_attempts: 3
  retryable_failure_types: [eval_failed, output_schema, worker_exception]
repair_strategy:
  autonomous: true
  before_retry:
    - run draft-schema-normalizer to enforce channel/status/publish false
    - keep source links in a separate Sources section
  escalation: never_for_draft_only_guardrail_shape
stop_conditions:
  - trend_quality_report_created
memory_policy:
  writes: artifact_only
side_effect_policy:
  external_side_effects: none
