key: stop-slop-editor
description: Remove predictable AI writing patterns from drafts while preserving claims and evidence.
worker_type: sandboxed_subprocess
entrypoint: l2l3_protocol.workers.build_in_public_worker
allowed_tools: [stop-slop-editor-tool]
compatible_tools: [stop-slop-editor-tool]
budget:
  max_seconds: 60
input_schema:
  type: object
  required: [drafts]
output_schema:
  type: object
  required: [edited_drafts]
stop_conditions:
  - slop_removed
retry_policy:
  max_attempts: 2
  retryable_failure_types: [input_validation, output_schema, worker_exception]
repair_strategy:
  autonomous: true
  before_retry:
    - run draft-schema-normalizer to convert thread arrays into text strings
  escalation: never_for_thread_to_text_mapping
memory_policy:
  writes: artifact_only
side_effect_policy:
  external_side_effects: none
